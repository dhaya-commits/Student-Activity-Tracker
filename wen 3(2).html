<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login Portal</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --primary-blue: #2d6cdf;
            --secondary-blue: #4f8cff;
            --accent-green: #4caf50;
        }

        body {
            background: linear-gradient(rgba(0, 0, 0, 0.4), rgba(0, 0, 0, 0.4)), 
                        url('https://images.unsplash.com/photo-1497215728101-856f4ea42174?auto=format&fit=crop&w=1920&q=80');
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            min-height: 100vh;
            margin: 0;
            font-family: 'Segoe UI', Arial, sans-serif;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            overflow-x: hidden;
        }

        .portal-container {
            display: flex;
            gap: 40px;
            perspective: 1000px;
            margin-bottom: 40px;
        }

        /* Floating Widgets */
        .login-widget {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            width: 300px;
            height: 350px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            cursor: pointer;
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
            text-align: center;
            padding: 20px;
        }

        .login-widget:hover {
            transform: translateY(-15px);
            background: #fff;
            box-shadow: 0 20px 40px rgba(0,0,0,0.4);
        }

        .login-widget i.main-icon {
            font-size: 5rem;
            color: var(--primary-blue);
            margin-bottom: 20px;
        }

        /* Form Container */
        .form-container {
            display: none;
            background: white;
            padding: 40px;
            border-radius: 20px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.2);
            width: 350px;
            position: relative; /* REQUIRED for the X button position */
            animation: slideUp 0.5s ease;
        }

        @keyframes slideUp {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .active-form { display: block; }

        /* --- THE FIX: X BUTTON STYLING --- */
        .close-btn {
            position: absolute;
            top: 20px;
            right: 20px;
            font-size: 1.2rem;
            color: #999;
            cursor: pointer;
            transition: color 0.2s, transform 0.2s;
        }

        .close-btn:hover {
            color: #333;
            transform: scale(1.2);
        }

        /* Form Styling */
        .back-btn {
            background: none;
            border: none;
            color: var(--primary-blue);
            cursor: pointer;
            font-weight: bold;
            display: flex;
            align-items: center;
            gap: 5px;
            margin-bottom: 20px;
            padding: 0;
        }

        label {
            display: block;
            font-weight: 600;
            color: var(--primary-blue);
            margin-bottom: 8px;
        }

        input {
            width: 100%;
            padding: 12px;
            margin-bottom: 20px;
            border: 1.5px solid #ddd;
            border-radius: 8px;
            box-sizing: border-box;
        }

        .login-button {
            width: 100%;
            padding: 12px;
            background: linear-gradient(90deg, var(--primary-blue), var(--secondary-blue));
            color: white;
            border: none;
            border-radius: 8px;
            font-weight: bold;
            cursor: pointer;
            transition: 0.3s;
        }

        .register-section {
            background: rgba(255, 255, 255, 0.9);
            padding: 20px 40px;
            border-radius: 50px;
            text-align: center;
            margin-top: 20px;
        }

        .register-btn { color: var(--accent-green); text-decoration: none; font-weight: bold; }

        @media (max-width: 768px) {
            .portal-container { flex-direction: column; }
        }
    </style>
</head>
<body>

    <div class="portal-container" id="portal-container">
        <div class="login-widget" onclick="showForm('student')">
            <i class="fa-solid fa-user-graduate main-icon"></i>
            <h2>Student</h2>
            <p>Click to access Student Dashboard</p>
        </div>

        <div class="login-widget" onclick="showForm('admin')">
            <i class="fa-solid fa-user-shield main-icon"></i>
            <h2>Admin</h2>
            <p>Click to access Admin Panel</p>
        </div>
    </div>

    <div id="student-form" class="form-container">
        <i class="fa-solid fa-xmark close-btn" onclick="hideForms()"></i>
        
        <button class="back-btn" onclick="hideForms()"><i class="fa-solid fa-arrow-left"></i> Back</button>
        <h2>Student Login</h2>
        <form id="student-login-form">
            <label><i class="fa-solid fa-user"></i> Username</label>
            <input type="text" id="student-username" required>
            <label><i class="fa-solid fa-lock"></i> Password</label>
            <input type="password" id="student-password" required>
            <button type="submit" class="login-button">Login</button>
        </form>
    </div>

    <div id="admin-form" class="form-container">
        <i class="fa-solid fa-xmark close-btn" onclick="hideForms()"></i>

        <button class="back-btn" onclick="hideForms()"><i class="fa-solid fa-arrow-left"></i> Back</button>
        <h2>Admin Login</h2>
        <form id="admin-login-form">
            <label><i class="fa-solid fa-user"></i> Username</label>
            <input type="text" id="admin-username" required>
            <label><i class="fa-solid fa-lock"></i> Password</label>
            <input type="password" id="admin-password" required>
            <button type="submit" class="login-button">Login</button>
        </form>
    </div>

    <div class="register-section">
        <span>Don't have an account? </span>
        <a href="register.html" class="register-btn">Register here</a>
    </div>

    <script>
        function showForm(userType) {
            document.getElementById('portal-container').style.display = 'none';
            if(userType === 'student') {
                document.getElementById('student-form').classList.add('active-form');
            } else {
                document.getElementById('admin-form').classList.add('active-form');
            }
        }

        function hideForms() {
            document.getElementById('portal-container').style.display = 'flex';
            document.getElementById('student-form').classList.remove('active-form');
            document.getElementById('admin-form').classList.remove('active-form');
        }
        function closeModal() 
        {
            document.getElementById('add-new-modal').style.display = 'none';
        }

        function openModal() 
        {
            document.getElementById('add-new-modal').style.display = 'flex';
        }

        // Login Logic remains the same...
        // Student Login Logic
    document.getElementById('student-login-form').addEventListener('submit', async function(event) {
    event.preventDefault();
    const username = document.getElementById('student-username').value;
    const password = document.getElementById('student-password').value;

    try {
        const response = await fetch('http://localhost:5000/api/auth/login', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ username, password })
        });
        
        const result = await response.json();
        
        if (response.ok && result.user.role === 'student') {
            localStorage.setItem('token', result.token);
            localStorage.setItem('currentUser', JSON.stringify(result.user));
            // Ensure 'Student page.html' exists in your directory
            window.location.href = 'Student page.html'; 
        } else {
            alert(result.message || 'Invalid student username or password.');
        }
    } catch (error) {
        // Detailed error for troubleshooting
        console.error('Login Error:', error);
        alert('Connection failed. Please ensure the backend server is running on port 5000.');
    }
});

        document.getElementById('admin-login-form').addEventListener('submit', async function(event) {
            event.preventDefault();
            // ... your fetch logic ...
            alert('Admin login triggered');
        });
    </script>
</body>
</html>
